apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting
  namespace: targeting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting
  template:
    metadata:
      labels:
        app: targeting
    spec:
      containers:
      - name: targeting
        image: 257527265067.dkr.ecr.us-east-1.amazonaws.com/fiap-fase2/targeting-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8003
        envFrom:
          - secretRef:
              name: targeting-secrets
          - configMapRef:
              name: targeting-config
