apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
      - name: analytics
        image: 257527265067.dkr.ecr.us-east-1.amazonaws.com/fiap-fase2/analytics-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8005
        envFrom:
        - secretRef:
            name: analytics-secrets
        - configMapRef:
            name: analytics-config
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
