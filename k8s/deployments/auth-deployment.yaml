apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: 257527265067.dkr.ecr.us-east-1.amazonaws.com/fiap-fase2/auth-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        envFrom:
        - secretRef:
            name: auth-secrets
        - configMapRef:
            name: auth-config
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
