apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: fiap-fase2
  region: us-east-1
  version: "1.34"

vpc:
  id: vpc-07bc598a74022545c

  clusterEndpoints:
    publicAccess: true
    privateAccess: false

  subnets:
    public:
      us-east-1a:
        id: subnet-0d03ac263ca56a177
      us-east-1b:
        id: subnet-0440f2de158dce59f

    private:
      us-east-1a:
        id: subnet-03862098bafa3771d
      us-east-1b:
        id: subnet-00473aff5107c3966

iam:
  withOIDC: true

managedNodeGroups:
  - name: fiap-fase2-workers
    instanceType: t3.small

    minSize: 1
    desiredCapacity: 2
    maxSize: 4

    volumeSize: 20
    volumeType: gp3

    subnets:
      - us-east-1a
      - us-east-1b

    privateNetworking: false

    labels:
      role: application

    tags:
      Project: fiap-fase2
      Environment: lab

    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
